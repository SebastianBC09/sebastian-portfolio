# ============================================
# Sebastian Ballen Portfolio — CI/CD Pipeline
# Build on GitHub Actions, deploy to DigitalOcean
# ============================================

name: Deploy Portfolio

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/sebastianbc09/portfolio
  APP_DIR: /var/www/bccloudsolutions.dev

jobs:
  # Job 1: Lint and type-check
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm tsc --noEmit

  # Job 2: Build Docker image and push to GHCR
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_SANITY_PROJECT_ID=${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }} \
            --build-arg NEXT_PUBLIC_SANITY_DATASET=${{ secrets.NEXT_PUBLIC_SANITY_DATASET }} \
            -t ${{ env.IMAGE }}:latest .
          docker push ${{ env.IMAGE }}:latest

  # Job 3: Pull image on Droplet and restart container
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Sync docker-compose.yml to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: ${{ env.APP_DIR }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            # Authenticate and pull the pre-built image (no build on Droplet)
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/sebastianbc09/portfolio:latest

            # Restart container with new image
            cd ${{ env.APP_DIR }}
            docker compose down
            docker compose up -d

            # Clean up old images
            docker image prune -f

            # Health check (wait up to 30s)
            echo "Waiting for app to start..."
            for i in $(seq 1 10); do
              if curl -sf http://localhost:3000 > /dev/null 2>&1; then
                echo "✅ App is healthy!"
                exit 0
              fi
              echo "  Attempt $i/10..."
              sleep 3
            done

            echo "❌ Health check failed"
            docker compose logs --tail 50
            exit 1
